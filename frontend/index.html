<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TubeOS — YouTube Connect Test</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:      #0c0c0e;
      --surface: #141416;
      --surface2:#1c1c1f;
      --border:  #2a2a2e;
      --text:    #f0f0f0;
      --muted:   #666;
      --brand:   #6366f1;
      --red:     #ef4444;
      --green:   #22c55e;
      --amber:   #f59e0b;
      --blue:    #3b82f6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* Layout */
    .container { max-width: 860px; margin: 0 auto; padding: 2rem; }
    header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
    header h1 { font-size: 18px; font-weight: 600; }
    .badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; font-family: 'DM Mono', monospace; }
    .badge-test { background: rgba(99,102,241,0.15); color: var(--brand); border: 1px solid rgba(99,102,241,0.3); }

    /* Two column layout */
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    @media(max-width:640px){ .grid { grid-template-columns: 1fr; } }

    /* Cards */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; }
    .card-title { font-size: 12px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); margin-bottom: 1rem; display: flex; align-items: center; gap: 6px; }
    .card-title .dot { width: 6px; height: 6px; border-radius: 50%; }
    .dot-purple { background: var(--brand); }
    .dot-red    { background: var(--red); }
    .dot-green  { background: var(--green); }
    .dot-blue   { background: var(--blue); }

    /* Form */
    input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; margin-bottom: 8px; outline: none; transition: border-color 0.15s; }
    input:focus { border-color: var(--brand); }
    input::placeholder { color: var(--muted); }

    /* Buttons */
    button { font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; padding: 9px 16px; border-radius: 8px; border: none; cursor: pointer; transition: all 0.15s; width: 100%; }
    .btn-primary { background: var(--brand); color: #fff; }
    .btn-primary:hover { background: #4f52e0; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-yt { background: #FF0000; color: #fff; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-yt:hover { background: #cc0000; }
    .btn-yt:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--muted); }
    .btn-outline:hover { border-color: #444; color: var(--text); }
    .btn-danger { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: var(--red); }
    .btn-danger:hover { background: rgba(239,68,68,0.2); }
    .btn-sm { padding: 6px 12px; font-size: 13px; width: auto; }

    /* Status */
    .status-bar { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 8px; font-size: 13px; margin-bottom: 8px; }
    .status-bar.info    { background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.2); color: #93c5fd; }
    .status-bar.success { background: rgba(34,197,94,0.1);  border: 1px solid rgba(34,197,94,0.2);  color: #86efac; }
    .status-bar.error   { background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.2);  color: #fca5a5; }
    .status-bar.warning { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.2); color: #fcd34d; }

    /* Log */
    #log { font-family: 'DM Mono', monospace; font-size: 12px; line-height: 1.8; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; max-height: 240px; overflow-y: auto; margin-bottom: 16px; }
    .log-req  { color: #60a5fa; }
    .log-ok   { color: var(--green); }
    .log-err  { color: var(--red); }
    .log-info { color: var(--muted); }
    .log-time { color: #444; margin-right: 6px; }

    /* Channel card */
    .channel-card { display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; }
    .channel-thumb { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; background: var(--border); }
    .channel-name { font-size: 14px; font-weight: 600; }
    .channel-meta { font-size: 12px; color: var(--muted); margin-top: 2px; font-family: 'DM Mono', monospace; }
    .channel-actions { margin-left: auto; display: flex; gap: 6px; }

    /* Token display */
    .token-box { font-family: 'DM Mono', monospace; font-size: 11px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px; word-break: break-all; color: var(--muted); max-height: 80px; overflow-y: auto; margin-top: 8px; }

    /* Divider */
    .divider { height: 1px; background: var(--border); margin: 12px 0; }

    /* User pill */
    #userPill { display: none; align-items: center; gap: 8px; padding: 6px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; font-size: 13px; }
    .user-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div style="display:flex;align-items:center;gap:10px">
      <svg width="24" height="17" viewBox="0 0 90 63" fill="none">
        <rect width="90" height="63" rx="12" fill="#FF0000"/>
        <path d="M36 18L62 31.5L36 45V18Z" fill="white"/>
      </svg>
      <h1>TubeOS — YouTube Connect Test</h1>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span class="badge badge-test">TEST MODE</span>
      <div id="userPill">
        <div class="user-dot"></div>
        <span id="userPillName">—</span>
        <button class="btn-outline btn-sm" onclick="App.logout()" style="margin:0">logout</button>
      </div>
    </div>
  </header>

  <!-- API Log -->
  <div class="card-title" style="margin-bottom:8px"><div class="dot dot-blue"></div> API Activity Log</div>
  <div id="log"><span class="log-info">— Waiting for activity…</span></div>

  <div class="grid">

    <!-- Step 1: Auth -->
    <div class="card">
      <div class="card-title"><div class="dot dot-purple"></div> Step 1 — Login / Register</div>
      <input id="authName" placeholder="Name (sirf register ke liye)" />
      <input id="authEmail" placeholder="Email" type="email" />
      <input id="authPassword" placeholder="Password" type="password" />
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px">
        <button class="btn-primary" onclick="App.register()">Register</button>
        <button class="btn-outline" onclick="App.login()">Login</button>
      </div>
      <div id="authStatus" style="margin-top:8px"></div>
      <div id="tokenBox" style="display:none">
        <div class="divider"></div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:4px">JWT Access Token:</div>
        <div class="token-box" id="tokenDisplay"></div>
      </div>
    </div>

    <!-- Step 2: YouTube Connect -->
    <div class="card">
      <div class="card-title"><div class="dot dot-red"></div> Step 2 — YouTube Connect</div>
      <div id="connectStatus" class="status-bar info">Login karo pehle (Step 1)</div>
      <button class="btn-yt" id="connectBtn" onclick="App.connectYouTube()" disabled style="margin-top:8px">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M23.5 6.5s-.3-2-1.2-2.8c-1.1-1.2-2.4-1.2-3-1.2C16.6 2.4 12 2.4 12 2.4s-4.6 0-7.3.1c-.6.1-1.9.1-3 1.2C.8 4.5.5 6.5.5 6.5S.2 8.8.2 11.1v2.2c0 2.3.3 4.6.3 4.6s.3 2 1.2 2.8c1.1 1.2 2.6 1.1 3.3 1.2C7.2 22 12 22 12 22s4.6 0 7.3-.1c.6-.1 1.9-.1 3-1.2.9-.8 1.2-2.8 1.2-2.8s.3-2.3.3-4.6v-2.2c0-2.3-.3-4.6-.3-4.6zM9.7 15.5V8.4l8.1 3.6-8.1 3.5z"/>
        </svg>
        Connect YouTube Channel
      </button>
      <div style="margin-top:12px">
        <button class="btn-outline" onclick="App.getChannels()" style="font-size:13px">
          🔄 Channels Refresh Karo
        </button>
      </div>
    </div>

  </div>

  <!-- Step 3: Connected Channels -->
  <div class="card">
    <div class="card-title"><div class="dot dot-green"></div> Step 3 — Connected Channels</div>
    <div id="channelsList">
      <div class="status-bar info">Pehle login karo, phir YouTube connect karo</div>
    </div>
  </div>

</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────
const BACKEND = 'https://yt-connect-test.onrender.com/api/v1';

// ─── STATE ───────────────────────────────────────────────────────
const State = {
  token: sessionStorage.getItem('test_token') || null,
  user:  JSON.parse(sessionStorage.getItem('test_user') || 'null'),
  save(token, user) {
    this.token = token; this.user = user;
    sessionStorage.setItem('test_token', token);
    sessionStorage.setItem('test_user', JSON.stringify(user));
  },
  clear() {
    this.token = null; this.user = null;
    sessionStorage.removeItem('test_token');
    sessionStorage.removeItem('test_user');
  }
};

// ─── LOGGER ──────────────────────────────────────────────────────
const Log = {
  _el: null,
  init() { this._el = document.getElementById('log'); this._el.innerHTML = ''; },
  add(msg, type = 'info') {
    const t = new Date().toLocaleTimeString('en-IN', { hour12: false });
    const div = document.createElement('div');
    div.innerHTML = `<span class="log-time">${t}</span><span class="log-${type}">${msg}</span>`;
    this._el.appendChild(div);
    this._el.scrollTop = this._el.scrollHeight;
  }
};

// ─── API ─────────────────────────────────────────────────────────
const API = {
  async call(path, options = {}) {
    const url = BACKEND + path;
    const method = options.method || 'GET';
    Log.add(`→ ${method} ${path}`, 'req');
    const headers = { 'Content-Type': 'application/json' };
    if (State.token) headers['Authorization'] = `Bearer ${State.token}`;
    const res = await fetch(url, { ...options, headers });
    const data = await res.json();
    if (!res.ok) {
      Log.add(`✗ ${path} — ${data.message || res.status}`, 'err');
      throw Object.assign(new Error(data.message || 'Request failed'), { status: res.status, data });
    }
    Log.add(`✓ ${path} — ${res.status} OK`, 'ok');
    return data;
  },
  register: (d) => API.call('/auth/register', { method: 'POST', body: JSON.stringify(d) }),
  login:    (d) => API.call('/auth/login',    { method: 'POST', body: JSON.stringify(d) }),
  getAuthUrl:  () => API.call('/youtube/auth'),
  getChannels: () => API.call('/youtube/channels'),
  syncChannel: (id) => API.call(`/youtube/channels/${id}/sync`, { method: 'POST' }),
  disconnect:  (id) => API.call(`/youtube/channels/${id}`, { method: 'DELETE' }),
};

// ─── UI HELPERS ───────────────────────────────────────────────────
const UI = {
  status(elId, msg, type = 'info') {
    const el = document.getElementById(elId);
    if (el) el.innerHTML = `<div class="status-bar ${type}">${msg}</div>`;
  },
  setLoggedIn(user, token) {
    document.getElementById('userPillName').textContent = user.name || user.email;
    document.getElementById('userPill').style.display = 'flex';
    document.getElementById('connectBtn').disabled = false;
    document.getElementById('tokenDisplay').textContent = token;
    document.getElementById('tokenBox').style.display = 'block';
    UI.status('authStatus', `✅ Logged in as <b>${user.email}</b>`, 'success');
    UI.status('connectStatus', 'Ready! "Connect YouTube Channel" click karo', 'success');
  },
  setLoggedOut() {
    document.getElementById('userPill').style.display = 'none';
    document.getElementById('connectBtn').disabled = true;
    document.getElementById('tokenBox').style.display = 'none';
    UI.status('authStatus', '', 'info');
    UI.status('connectStatus', 'Login karo pehle (Step 1)', 'info');
    document.getElementById('channelsList').innerHTML =
      '<div class="status-bar info">Pehle login karo, phir YouTube connect karo</div>';
  },
  renderChannels(channels) {
    const el = document.getElementById('channelsList');
    if (!channels || channels.length === 0) {
      el.innerHTML = '<div class="status-bar warning">Koi channel connected nahi hai. Step 2 se connect karo.</div>';
      return;
    }
    el.innerHTML = channels.map(ch => `
      <div class="channel-card">
        <img class="channel-thumb" src="${ch.thumbnail || ''}" onerror="this.style.background='#333'" />
        <div>
          <div class="channel-name">${ch.channelName}</div>
          <div class="channel-meta">
            ${ch.channelHandle ? '@' + ch.channelHandle.replace('@','') + ' &nbsp;|&nbsp; ' : ''}
            ${Number(ch.stats?.subscriberCount||0).toLocaleString()} subs &nbsp;|&nbsp;
            ${Number(ch.stats?.videoCount||0).toLocaleString()} videos &nbsp;|&nbsp;
            <span style="color:${ch.connectionStatus==='connected'?'var(--green)':'var(--amber)'}">
              ${ch.connectionStatus}
            </span>
            ${ch.isPrimary ? ' &nbsp;|&nbsp; <span style="color:var(--brand)">★ primary</span>' : ''}
          </div>
        </div>
        <div class="channel-actions">
          <button class="btn-outline btn-sm" onclick="App.syncChannel('${ch._id}')">Sync</button>
          <button class="btn-danger btn-sm" onclick="App.disconnect('${ch._id}')">Disconnect</button>
        </div>
      </div>
    `).join('');
  }
};

// ─── APP ─────────────────────────────────────────────────────────
const App = {
  async register() {
    try {
      const name     = document.getElementById('authName').value.trim();
      const email    = document.getElementById('authEmail').value.trim();
      const password = document.getElementById('authPassword').value;
      if (!name || !email || !password) {
        return UI.status('authStatus', 'Name, email aur password dalo', 'error');
      }
      const res = await API.register({ name, email, password });
      State.save(res.data.accessToken, res.data.user);
      UI.setLoggedIn(res.data.user, res.data.accessToken);
    } catch (err) {
      UI.status('authStatus', err.message, 'error');
    }
  },

  async login() {
    try {
      const email    = document.getElementById('authEmail').value.trim();
      const password = document.getElementById('authPassword').value;
      if (!email || !password) return UI.status('authStatus', 'Email aur password dalo', 'error');
      const res = await API.login({ email, password });
      State.save(res.data.accessToken, res.data.user);
      UI.setLoggedIn(res.data.user, res.data.accessToken);
    } catch (err) {
      UI.status('authStatus', err.message, 'error');
    }
  },

  logout() {
    State.clear();
    UI.setLoggedOut();
    Log.add('Logged out', 'info');
  },

  async connectYouTube() {
    try {
      if (!State.token) return UI.status('connectStatus', 'Pehle login karo', 'error');
      UI.status('connectStatus', 'Auth URL le raha hun backend se…', 'info');

      // Step 1: Get auth URL from backend
      const res = await API.getAuthUrl();
      const { authUrl } = res.data;

      UI.status('connectStatus', 'Google popup khul raha hai…', 'info');
      Log.add('Popup open kar raha hun Google OAuth ke liye', 'info');

      // Step 2: Open popup
      const w = 600, h = 700;
      const l = window.screenX + (window.outerWidth - w) / 2;
      const t = window.screenY + (window.outerHeight - h) / 2;
      const popup = window.open(authUrl, 'yt-oauth', `width=${w},height=${h},left=${l},top=${t}`);

      if (!popup) {
        return UI.status('connectStatus', 'Popup blocked! Browser mein popup allow karo.', 'error');
      }

      // Step 3: Wait for popup to close
      const check = setInterval(async () => {
        if (popup.closed) {
          clearInterval(check);
          Log.add('Popup closed — channels check kar raha hun', 'info');
          await App.getChannels();

          // Check URL params (agar same tab redirect hua ho)
          const params = new URLSearchParams(window.location.search);
          if (params.get('youtube_connected')) {
            UI.status('connectStatus', `✅ ${params.get('channel') || 'Channel'} connected!`, 'success');
            window.history.replaceState({}, '', window.location.pathname);
          } else if (params.get('youtube_error')) {
            const errMap = {
              access_denied:    'Tumne cancel kiya.',
              no_refresh_token: 'Refresh token nahi mila. myaccount.google.com/permissions pe jaake app remove karo aur dobara try karo.',
              already_connected: 'Ye channel kisi aur account se connected hai.',
              connect_failed:   'Connect fail hua. Dobara try karo.',
            };
            UI.status('connectStatus', errMap[params.get('youtube_error')] || 'Error aaya', 'error');
            window.history.replaceState({}, '', window.location.pathname);
          }
        }
      }, 500);

    } catch (err) {
      UI.status('connectStatus', err.message, 'error');
    }
  },

  async getChannels() {
    try {
      if (!State.token) return;
      const res = await API.getChannels();
      const channels = res.data || [];
      UI.renderChannels(channels);
      Log.add(`${channels.length} channel(s) found`, 'ok');
    } catch (err) {
      Log.add('Channels fetch failed: ' + err.message, 'err');
    }
  },

  async syncChannel(id) {
    try {
      await API.syncChannel(id);
      await App.getChannels();
    } catch (err) {
      Log.add('Sync failed: ' + err.message, 'err');
    }
  },

  async disconnect(id) {
    if (!confirm('Is channel ko disconnect karna chahte ho?')) return;
    try {
      await API.disconnect(id);
      await App.getChannels();
    } catch (err) {
      Log.add('Disconnect failed: ' + err.message, 'err');
    }
  },

  // Check URL params on load (callback redirect handle)
  checkCallbackParams() {
    const params = new URLSearchParams(window.location.search);
    if (params.get('youtube_connected')) {
      UI.status('connectStatus', `✅ "${params.get('channel') || 'Channel'}" connected!`, 'success');
      App.getChannels();
      window.history.replaceState({}, '', window.location.pathname);
    }
    if (params.get('youtube_error')) {
      UI.status('connectStatus', `Error: ${params.get('youtube_error')}`, 'error');
      window.history.replaceState({}, '', window.location.pathname);
    }
  }
};

// ─── INIT ─────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  Log.init();
  Log.add('Test app ready. Backend: ' + BACKEND, 'info');

  // Restore session
  if (State.token && State.user) {
    UI.setLoggedIn(State.user, State.token);
    App.getChannels();
    Log.add('Session restored: ' + State.user.email, 'ok');
  }

  App.checkCallbackParams();
});
</script>
</body>
</html>
